services:
  - type: web
    name: doorstep-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONUNBUFFERED=1 uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doorstep-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: ""  # Set this to your deployed frontend URL
databases:
  - name: doorstep-db
    databaseName: doorstep_db
    user: doorstep_user
    plan: free
