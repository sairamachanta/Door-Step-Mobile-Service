services:
  - type: web
    name: doorstep-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONUNBUFFERED=1 uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doorstep-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: ""  # Will be auto-set after frontend deploys

  - type: web
    name: doorstep-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://doorstep-backend-a4b1.onrender.com/api

databases:
  - name: doorstep-db
    databaseName: doorstep_db
    user: doorstep_user
    plan: free
