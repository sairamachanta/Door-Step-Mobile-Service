services:
  - type: web
    name: doorstep-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doorstep-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: doorstep-db
    databaseName: doorstep_db
    user: doorstep_user
    plan: free
